version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moim_tailboard
      MYSQL_USER: moim
      MYSQL_PASSWORD: moimpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: ..
      dockerfile: ./docker/node.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://moim:moimpassword@db:3306/moim_tailboard
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"
    working_dir: /usr/src/app/backend
    command: ["npm", "run", "start"]

volumes:
  db_data:

